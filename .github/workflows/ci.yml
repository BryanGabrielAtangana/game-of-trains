name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install libclang (gdext codegen)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all -- --check

      # -D warnings only on our crates (via clippy), not on third-party deps
      # like `godot`, which we don't control.
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Engine builds for WebAssembly
        run: cargo build -p train-core --target wasm32-unknown-unknown

      - name: Godot extension builds (release)
        run: cargo build -p rail-royale-gd --release

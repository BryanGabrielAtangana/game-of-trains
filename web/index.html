<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#4fc1e9" />
    <meta
      name="description"
      content="Game of Trains — route the trains to the right stations. A daily puzzle with global leaderboards and streaks."
    />
    <title>🚂 Game of Trains</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <style>
      :root {
        color-scheme: light;
        --sky: #4fc1e9;
        --grass: #a0d468;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(var(--sky) 0%, #8fd6ee 42%, var(--grass) 42%);
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      /* The macroquad/miniquad runtime renders into #glcanvas. */
      #glcanvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 1;
        touch-action: none;
        outline: none;
      }
      /* Loading splash, shown behind the (initially transparent) canvas. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: grid;
        place-items: center;
        text-align: center;
        color: #2b3a42;
      }
      #splash .train {
        font-size: clamp(3rem, 16vw, 5rem);
        animation: chug 1.1s ease-in-out infinite;
      }
      @keyframes chug {
        0%,
        100% {
          transform: translateY(0) rotate(-1deg);
        }
        50% {
          transform: translateY(-8px) rotate(1deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash .train {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div>
        <div class="train">🚂</div>
        <p id="status">Loading Game of Trains…</p>
        <pre id="err" style="white-space:pre-wrap;color:#b00;font-size:12px;max-width:90vw;margin:0 auto;"></pre>
      </div>
    </div>
    <canvas id="glcanvas" tabindex="0"></canvas>

    <script>
      // Surface everything to the screen (no devtools on mobile).
      const errBox = document.getElementById("err");
      const statusEl = document.getElementById("status");
      let sawError = false;
      function fmt(x) {
        if (x instanceof Error) {
          return `${x.name}: ${x.message}\n${x.stack || ""}`;
        }
        if (typeof x === "object") {
          try {
            return JSON.stringify(x);
          } catch {
            return String(x);
          }
        }
        return String(x);
      }
      function show(label, ...args) {
        if (label !== "log") {
          sawError = true;
          statusEl.textContent = "Diagnostics:";
        }
        errBox.textContent += `\n[${label}] ${args.map(fmt).join(" ")}`;
      }
      window.addEventListener("error", (ev) =>
        show("error", ev.error || ev.message),
      );
      window.addEventListener("unhandledrejection", (ev) =>
        show("promise", ev.reason),
      );
      // macroquad routes Rust panics/logs through console.log & console.error.
      for (const m of ["log", "warn", "error"]) {
        const orig = console[m].bind(console);
        console[m] = (...a) => {
          show(m, ...a);
          orig(...a);
        };
      }
      // Disable the service worker while debugging so reloads are always fresh.
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .getRegistrations()
          .then((rs) => rs.forEach((r) => r.unregister()))
          .catch(() => {});
      }
      // WebKit masks wasm traps thrown from a requestAnimationFrame callback as
      // a detail-less "Script error." Wrap rAF so we capture the real message.
      const _raf = window.requestAnimationFrame.bind(window);
      window.requestAnimationFrame = (cb) =>
        _raf((t) => {
          try {
            return cb(t);
          } catch (e) {
            show("frame", e);
            throw e;
          }
        });
      // gl.js routes its wasm entry calls through this so traps in main/frame/
      // resize/input surface with full detail instead of "Script error.".
      window.__wrapExports = (ex) => {
        const o = {};
        for (const k of Object.keys(ex)) {
          const v = ex[k];
          o[k] =
            typeof v === "function"
              ? function () {
                  try {
                    return v.apply(ex, arguments);
                  } catch (e) {
                    show("wasm:" + k, e);
                    throw e;
                  }
                }
              : v;
        }
        return o;
      };
    </script>
    <script src="./mq_js_bundle.js"></script>
    <script>
      // Boot the WebAssembly game. miniquad owns the #glcanvas sizing (via CSS
      // width/height:100% + its dpi handling); we no longer touch it manually.
      try {
        load("./train-client.wasm");
      } catch (e) {
        show("load", e);
      }
      // (Service worker intentionally disabled while we debug startup.)
    </script>
  </body>
</html>

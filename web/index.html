<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4fc1e9" />
    <meta
      name="description"
      content="Rail Royale — a turn-based strategy battler on rails. In development."
    />
    <title>🚂 Rail Royale</title>
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0; height: 100%;
        background: linear-gradient(#4fc1e9 0%, #8fd6ee 55%, #a0d468 55%);
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        color: #2b3a42;
      }
      main {
        position: fixed; inset: 0; display: grid; place-items: center; text-align: center;
        padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom);
      }
      .train { font-size: clamp(3rem, 16vw, 5rem); animation: chug 1.1s ease-in-out infinite; }
      h1 { font-size: clamp(2rem, 9vw, 3.4rem); margin: 0.2em 0 0.1em; letter-spacing: 0.02em; }
      p { margin: 0.3em 0; max-width: 30rem; opacity: 0.9; }
      a { color: #2b3a42; }
      @keyframes chug { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-8px) rotate(1deg); } }
      @media (prefers-reduced-motion: reduce) { .train { animation: none; } }
    </style>
  </head>
  <body>
    <main>
      <div>
        <div class="train">🚂⚔️</div>
        <h1>Rail Royale</h1>
        <p>A turn-based strategy battler on rails — route armed trains across a
           shared network and destroy the enemy base.</p>
        <p><strong>In development.</strong> The deterministic battle engine is
           built and tested; the web client is coming next.</p>
        <p><a href="https://github.com/BryanGabrielAtangana/game-of-trains">Follow along on GitHub →</a></p>
      </div>
    </main>
  </body>
</html>

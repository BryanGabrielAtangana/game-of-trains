<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#4fc1e9" />
    <meta
      name="description"
      content="Game of Trains — route the trains to the right stations. A daily puzzle with global leaderboards and streaks."
    />
    <title>🚂 Game of Trains</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon.svg" />
    <style>
      :root {
        color-scheme: light;
        --sky: #4fc1e9;
        --grass: #a0d468;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(var(--sky) 0%, #8fd6ee 42%, var(--grass) 42%);
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
      }
      /* The macroquad/miniquad runtime renders into #glcanvas. */
      #glcanvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 1;
        touch-action: none;
        outline: none;
      }
      /* Loading splash, shown behind the (initially transparent) canvas. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: grid;
        place-items: center;
        text-align: center;
        color: #2b3a42;
      }
      #splash .train {
        font-size: clamp(3rem, 16vw, 5rem);
        animation: chug 1.1s ease-in-out infinite;
      }
      @keyframes chug {
        0%,
        100% {
          transform: translateY(0) rotate(-1deg);
        }
        50% {
          transform: translateY(-8px) rotate(1deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash .train {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div>
        <div class="train">🚂</div>
        <p>Loading Game of Trains…</p>
      </div>
    </div>
    <canvas id="glcanvas" tabindex="0"></canvas>

    <script src="./mq_js_bundle.js"></script>
    <script>
      // Make the canvas track the viewport (incl. device pixel ratio) so the
      // game fills the screen crisply on mobile.
      const canvas = document.getElementById("glcanvas");
      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      // Boot the WebAssembly game.
      load("./train-client.wasm");

      // Register the service worker for offline / installable play.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .catch((err) => console.warn("SW registration failed:", err));
        });
      }
    </script>
  </body>
</html>
